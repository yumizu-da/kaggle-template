services:
  dev:
    container_name: ${KAGGLE_COMPETITION_NAME}_dev
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: '64gb'
    volumes:
      - type: bind
        source: $PWD
        target: /kaggle/working
    working_dir: /kaggle/working
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    tty: true
